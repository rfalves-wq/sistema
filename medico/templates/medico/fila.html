{% extends 'usuario/base.html' %}

{% block conteudo %}

<h2>Fila do Médico</h2>

<div id="fila-container">
    <!-- vazio -->
</div>

<script>
function atualizarFila() {
    fetch("{% url 'fila_medico_ajax' %}")
        .then(response => response.json())
        .then(data => {
            document.getElementById('fila-container').innerHTML = data.html;
        });
}

// carrega ao abrir
atualizarFila()

// atualiza a cada 5 segundos
setInterval(atualizarFila, 5000);
</script>

{% endblock %}
