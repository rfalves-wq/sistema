<h2>Fila de Triagem</h2>

<table border="1">
    <tr>
        <th>Paciente</th>
        <th>Ação</th>
    </tr>

    {% for p in pacientes %}
    <tr>
        <td>{{ p.nome }}</td>
        <td>
            <a href="{% url 'realizar_triagem' p.id %}">
                Fazer Triagem
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
