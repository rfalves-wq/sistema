<h2>Fila de Triagem</h2>

<table border="1">
    <tr>
        <th>Paciente</th>
        <th>Data</th>
        <th>Ação</th>
    </tr>

    {% for ag in agendamentos %}
    <tr>
        <td>{{ ag.paciente.nome }}</td>
        <td>{{ ag.data_agendamento }}</td>
        <td>
            <a href="{% url 'realizar_triagem' ag.id %}">
                Fazer Triagem
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
